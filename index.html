<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Boost Your Fluency — Home</title>
<meta name="theme-color" content="#ffffff">
<style>
  :root{
    /* Force light color scheme for form controls, etc. */
    color-scheme: light only;

    /* Page background (set to white) */
    --bg-grad-1:#ffffff;
    --bg-grad-2:#ffffff;

    /* Optional tile backdrop color shown while images load */
    --tile-fallback:#f7a07a;

    --tile-radius:20px;
    --tile-shadow:0 10px 26px rgba(0,0,0,.12);
    --tile-border:1px solid rgba(0,0,0,.08);

    --grid-gap:18px;
    --tile-min:210px;
    --maxw:1100px;

    /* Main text color on white */
    --text:#0f172a; /* slate-900-ish */
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    /* Solid white background (replace prior dark gradient) */
    background:#ffffff;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:20px 14px 28px}

  /* Header (title image only; logo block removed) */
  header{
    display:flex;align-items:center;gap:14px;justify-content:center;
    flex-wrap:wrap;margin:18px 0 8px;
    text-align:center; /* ensure center on narrow screens */
  }

  /* Title image: 18.78cm wide, up to 4cm tall; preserves aspect; responsive on small screens */
  .title-img{
    display:block;
    width:min(100%, 18.78cm);
    height:auto;        /* keep original ratio */
    max-height:4cm;     /* cap height as requested */
    margin-inline:auto; /* center */
  }
  .title-wrap{min-height:auto; margin:0 auto;}

  /* Instruction text under title: 1.5x original (.9rem → 1.35rem) in dark teal */
  .subtitle{
    font-size:1.35rem;
    line-height:1.1;
    color:#004d4d; /* dark teal */
    margin:6px 0 0.55em; /* add 0.5 line-space after (half of 1.1 line-height) */
  }

  /* Hide the text fallback visually but keep it for accessibility/SEO */
  .visually-hidden{
    position:absolute!important;width:1px;height:1px;margin:-1px;border:0;padding:0;
    clip:rect(0 0 0 0);overflow:hidden;white-space:nowrap
  }

  /* Grid */
  .grid{
    margin-top:14px;
    display:grid; gap:var(--grid-gap);
    grid-template-columns:repeat(auto-fill,minmax(var(--tile-min),1fr));
  }

  /* Tile: use attached module aspect ratio (334:287) for consistent boxes */
  .tile{
    position:relative;
    display:block;
    border-radius:var(--tile-radius);
    box-shadow:var(--tile-shadow);
    border:var(--tile-border);
    overflow:hidden;
    background:#ffffff;       /* white per original */
    min-height:170px;
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
    aspect-ratio:334/287;     /* was 1/1; now matches attached module image */
  }
  .tile:hover{ transform:translateY(-2px); filter:saturate(1.06) }
  /* Use a visible focus ring on white */
  .tile:focus-visible{ outline:3px solid #0b63f6; outline-offset:2px }

  .tile img{
    width:100%;
    height:100%;
    object-fit:contain;  /* prevent cropping */
    background:#ffffff;  /* ensure any empty area is white */
    display:block;
  }

  /* Optional subtle top gloss like your cards (kept) */
  .tile::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0) 40%);
    pointer-events:none;
  }

  /* Darken footer text a bit for readability on white */
  footer{color:#475569;text-align:center;margin:18px 0 24px}
</style>
</head>
<body>
  <div class="wrap">
    <!-- Header with title image only (no separate logo block) -->
    <header>
      <div class="title-wrap" aria-label="Boost Your Fluency">
        <img
          class="title-img"
          src="images/title.png"
          srcset="images/title.png 1x, images/title@2x.png 2x"
          alt="Boost Your Fluency"
          width="1200" height="260"
          loading="eager" decoding="async"
        >
        <!-- Accessible text fallback (not visible) -->
        <h1 class="visually-hidden">Boost Your Fluency</h1>
        <!-- Small instruction under title (adjusted size/color) -->
        <p class="subtitle">Click a topic to start</p>
      </div>
    </header>

    <section class="grid" id="grid" aria-label="Modules grid">
      <!-- Tiles will be injected below -->
    </section>

    <footer>© 2026 • For practice use.</footer>
  </div>

<script>
/* ======= Image upload instructions =======
Folder structure (create if missing):
- images/title.png (+ images/title@2x.png) -> your title/wordmark image (includes logo)
- images/modules/                       -> one image per module (listed below)

Module image guidelines:
- Format: SVG (preferred) or PNG (transparent background ideal)
- Size: at least 512×512 (larger is fine; will downscale)
- Tiles use "object-fit: contain" on a white background. The card box
  now follows the 334:287 aspect ratio to match the attached module.
=========================================== */

const modules = [
  {k:'animals',          n:'Animals',           img:'animals.png'},
  {k:'art',              n:'Art',               img:'art.png'},
  {k:'apps',             n:'Apps',              img:'apps.png'},
  {k:'books',            n:'Books',             img:'books.png'},

  {k:'broken_promises',  n:'Broken Promises',   img:'broken_promises.png'},
  {k:'challenges',       n:'Challenges',        img:'challenges.png'},
  {k:'clothes',          n:'Clothes',           img:'clothes.png'},
  {k:'confidence',       n:'Confidence',        img:'confidence.png'},

  {k:'crime',            n:'Crime',             img:'crime.png'},
  {k:'education',        n:'Education',         img:'education.png'},
  {k:'friends_family',   n:'Friends & Family',  img:'friends_family.png'},
  {k:'food',             n:'Food',              img:'food.png'},

  {k:'happiness',        n:'Happiness',         img:'happiness.png'},
  {k:'health',           n:'Health',            img:'health.png'},
  {k:'holidays',         n:'Holidays',          img:'holidays.png'},
  {k:'intelligence',     n:'Intelligence',      img:'intelligence.png'},

  {k:'media',            n:'Media',             img:'media.png'},
  {k:'nature',           n:'Nature',            img:'nature.png'},
  {k:'politeness',       n:'Politeness',        img:'politeness.png'},
  {k:'remembering',      n:'Remembering',       img:'remembering.png'}
];

const grid = document.getElementById('grid');
modules.forEach((m)=>{
  const a  = document.createElement('a');
  a.className = 'tile';
  a.href = `module.html?topic=${encodeURIComponent(m.k)}`;
  a.setAttribute('aria-label', m.n); // for screen readers only
  a.innerHTML = `<img src="images/modules/${m.img}" alt="">`;
  grid.appendChild(a);
});
</script>
</body>
</html>
