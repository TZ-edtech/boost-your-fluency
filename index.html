<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Boost Your Fluency — Home</title>
<meta name="theme-color" content="#ffffff">
<style>
  :root{
    color-scheme: light only;

    --bg-grad-1:#ffffff;
    --bg-grad-2:#ffffff;

    --tile-fallback:#f7a07a;

    --tile-radius:20px;
    --tile-shadow:none; /* no shading */
    --tile-border:1px solid rgba(0,0,0,.08);

    --grid-gap:18px;
    --tile-min:210px;
    --maxw:1100px;

    --text:#0f172a;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Inter,Roboto,Helvetica,Arial,sans-serif;
    color:var(--text);
    background:#ffffff;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:20px 14px 28px}

  /* Header */
  header{
    display:flex;align-items:center;justify-content:center;gap:14px;
    flex-wrap:wrap;margin:18px 0 8px; text-align:center;
  }

  /* Title image: preserves original ratio; height may scale down but never stretches */
  .title-img{
    display:block;
    max-width:min(100%, 900px);
    height:auto;                   /* keeps original aspect ratio */
    max-height:clamp(40px, 10vw, 110px);
    margin-inline:auto;            /* center */
  }
  .title-wrap{min-height:clamp(40px, 10vw, 110px); margin:0 auto;}

  /* Small instruction under title */
  .subtitle{
    font-size:.9rem;
    color:#0ea5a3; /* adjust as you like */
    margin:6px 0 0;
  }

  /* Grid */
  .grid{
    margin-top:14px;
    display:grid; gap:var(--grid-gap);
    grid-template-columns:repeat(auto-fill,minmax(var(--tile-min),1fr));
  }
  /* Force 4 per row on wider screens */
  @media (min-width: 980px){
    .grid{ grid-template-columns: repeat(4, 1fr); }
  }

  /* Tile: white container, no shading */
  .tile{
    position:relative;
    display:block;
    border-radius:var(--tile-radius);
    box-shadow:var(--tile-shadow);   /* none */
    border:var(--tile-border);
    overflow:hidden;
    background:#ffffff;              /* white background per request */
    cursor:pointer;
    transition:transform .12s ease, filter .12s ease;
    aspect-ratio:1/1;                /* square container */
    min-height:170px;
  }
  .tile:hover{ transform:translateY(-2px); filter:saturate(1.06) }
  .tile:focus-visible{ outline:3px solid #0b63f6; outline-offset:2px }

  .tile img{
    width:100%;
    height:100%;
    object-fit:contain;              /* show full artwork (no cropping) */
    background:#ffffff;              /* pure white behind transparent art */
    display:block;
    padding:14px;                    /* slight inset */
  }

  /* Remove the previous subtle gloss entirely (no shading) */
  .tile::after{ content:none; }

  footer{color:#475569;text-align:center;margin:18px 0 24px}
</style>
</head>
<body>
  <div class="wrap">
    <!-- Header with title image only -->
    <header>
      <div class="title-wrap" aria-label="Site title">
        <img
          class="title-img"
          src="images/title.png"
          srcset="images/title.png 1x, images/title@2x.png 2x"
          alt="Boost Your Fluency"
          width="1200" height="260"
          loading="eager" decoding="async"
        >
        <!-- Small instruction under title -->
        <p class="subtitle">Click a topic to start</p>
      </div>
    </header>

    <section class="grid" id="grid" aria-label="Modules grid">
      <!-- Tiles will be injected below -->
    </section>

    <footer>© 2026 • For practice use.</footer>
  </div>

<script>
/* ======= Image upload instructions =======
- Place your title image at: images/title.png (+ images/title@2x.png)
- Place module images at:   images/modules/<name>.png (or .svg)
- Module images display on a pure white square container with object-fit: contain,
  so no cropping or shading will appear.
=========================================== */

const modules = [
  {k:'animals',          n:'Animals',           img:'animals.png'},
  {k:'art',              n:'Art',               img:'art.png'},
  {k:'apps',             n:'Apps',              img:'apps.png'},
  {k:'books',            n:'Books',             img:'books.png'},

  {k:'broken_promises',  n:'Broken Promises',   img:'broken_promises.png'},
  {k:'challenges',       n:'Challenges',        img:'challenges.png'},
  {k:'clothes',          n:'Clothes',           img:'clothes.png'},
  {k:'confidence',       n:'Confidence',        img:'confidence.png'},

  {k:'crime',            n:'Crime',             img:'crime.png'},
  {k:'education',        n:'Education',         img:'education.png'},
  {k:'friends_family',   n:'Friends & Family',  img:'friends_family.png'},
  {k:'food',             n:'Food',              img:'food.png'},

  {k:'happiness',        n:'Happiness',         img:'happiness.png'},
  {k:'health',           n:'Health',            img:'health.png'},
  {k:'holidays',         n:'Holidays',          img:'holidays.png'},
  {k:'intelligence',     n:'Intelligence',      img:'intelligence.png'},

  {k:'media',            n:'Media',             img:'media.png'},
  {k:'nature',           n:'Nature',            img:'nature.png'},
  {k:'politeness',       n:'Politeness',        img:'politeness.png'},
  {k:'remembering',      n:'Remembering',       img:'remembering.png'}
];

const grid = document.getElementById('grid');
modules.forEach((m)=>{
  const a  = document.createElement('a');
  a.className = 'tile';
  a.href = `module.html?topic=${encodeURIComponent(m.k)}`;
  a.setAttribute('aria-label', m.n);
  a.innerHTML = `<img src="images/modules/${m.img}" alt="" loading="lazy" decoding="async">`;
  grid.appendChild(a);
});
</script>
</body>
</html>
